<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Voice Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.8);
        }

        .status {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .status.listening {
            color: #4ade80;
        }

        .visualizer-container {
            width: 100%;
            height: 300px;
            background: linear-gradient(to bottom, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid rgba(102, 126, 234, 0.5);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            overflow: hidden;
        }

        .bar {
            width: 6px;
            background: linear-gradient(to top, #667eea, #ff6b6b);
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.8);
            transition: height 0.05s ease-out;
            min-height: 5px;
        }

        .bar.active {
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        .btn-stop {
            background: #ff6b6b;
            color: white;
        }

        .btn-stop:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(255, 107, 107, 0.4);
        }

        .frequency-text {
            color: #667eea;
            font-size: 0.9em;
            margin-top: 15px;
        }

        .frequency-value {
            color: #fff;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 5px;
        }

        .info {
            color: #aaa;
            font-size: 0.85em;
            margin-top: 20px;
            line-height: 1.6;
        }

        .listening-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Jarvis Voice Visualizer</h1>
        <div class="status" id="status">Click "Start Listening" to begin</div>

        <div class="visualizer-container" id="visualizer"></div>

        <div class="controls">
            <button class="btn-start" onclick="startListening()">Start Listening</button>
            <button class="btn-stop" onclick="stopListening()">Stop Listening</button>
        </div>

        <div class="frequency-text">Frequency Level:</div>
        <div class="frequency-value" id="frequencyLevel">0 Hz</div>

        <div class="info">
            <p>Real-time voice visualization</p>
            <p>Bars increase with louder sounds and bass frequencies</p>
        </div>
    </div>

    <script>
        let audioContext;
        let analyser;
        let microphone;
        let javascriptNode;
        let animationId;
        let isListening = false;
        const bars = 80;
        const barElements = [];

        // Initialize visualizer bars
        function initBars() {
            const container = document.getElementById('visualizer');
            container.innerHTML = '';
            barElements.length = 0;
            
            for (let i = 0; i < bars; i++) {
                const bar = document.createElement('div');
                bar.className = 'bar';
                container.appendChild(bar);
                barElements.push(bar);
            }
        }

        // Start listening
        async function startListening() {
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256;
                    analyser.smoothingTimeConstant = 0.8;
                }

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);

                isListening = true;
                document.getElementById('status').innerHTML = '<span class="listening-dot"></span>Listening...';
                document.getElementById('status').classList.add('listening');

                initBars();
                animate();
            } catch (error) {
                alert('Microphone access denied: ' + error.message);
            }
        }

        // Stop listening
        function stopListening() {
            if (microphone) {
                microphone.disconnect();
                microphone.mediaStream.getTracks().forEach(track => track.stop());
                microphone = null;
            }

            isListening = false;
            document.getElementById('status').textContent = 'Stopped';
            document.getElementById('status').classList.remove('listening');

            if (animationId) {
                cancelAnimationFrame(animationId);
            }

            // Reset bars
            barElements.forEach(bar => {
                bar.style.height = '5px';
            });
        }

        // Animation loop
        function animate() {
            if (!isListening) return;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            const step = Math.floor(dataArray.length / bars);
            let maxFrequency = 0;

            for (let i = 0; i < bars; i++) {
                let sum = 0;
                for (let j = 0; j < step; j++) {
                    sum += dataArray[i * step + j];
                }
                const average = sum / step;
                const height = Math.max(5, (average / 255) * 280);

                barElements[i].style.height = height + 'px';

                if (average > maxFrequency) {
                    maxFrequency = average;
                }

                // Add glow effect for high frequencies
                if (average > 150) {
                    barElements[i].classList.add('active');
                } else {
                    barElements[i].classList.remove('active');
                }
            }

            // Update frequency display
            const frequencyHz = Math.round((maxFrequency / 255) * 20000);
            document.getElementById('frequencyLevel').textContent = frequencyHz + ' Hz';

            animationId = requestAnimationFrame(animate);
        }

        // Initialize on page load
        window.addEventListener('load', initBars);

        // Cleanup on page unload
        window.addEventListener('beforeunload', stopListening);
    </script>
</body>
</html>
